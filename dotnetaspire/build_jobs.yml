jobs:
- job: Publish
  displayName: ${{ format('{0} Build', parameters.name) }}
  steps:
  - template: ../dotnetcommon/dotnet_sdk.yml
    parameters:
      useDotNetSDK: ${{ parameters.useDotNetSDK }}

  - template: ../dotnetcommon/dotnet_auth.yml
    parameters:
      sources: ${{ parameters.sources }}

  - template: ../dotnetcommon/dotnet_tool.yml
    parameters:
      toolRestore: ${{ coalesce(parameters.toolRestore, false) }}

  - template: ../dotnetcommon/prebuild_common.yml
    parameters:
      preBuildScript: ${{ parameters.preBuildScript }}

  - ${{ if ne(parameters.skipTests, true) }}:
    - script: dotnet build *.slnx /p:Version=$(Build.BuildNumber) ${{ join(' ', parameters.buildParameters) }}
      displayName: 'DotNet Build'
      workingDirectory: ${{ parameters.projectSrc }}
      env:
        ${{ if parameters.buildEnvironmentVariables }}:
          ${{ each envVar in parameters.buildEnvironmentVariables }}:
            ${{ envVar.key }}: ${{ envVar.value }}

  - template: ../dotnetcommon/dotnet_dpi.yml
    parameters:
      dpi: ${{ parameters.dpi }}
      azureSubscription: ${{ parameters.azureSubscription }}

  - template: ../dotnetcommon/dotnet_tests.yml
    parameters:
      skipTests: ${{ parameters.skipTests }}
      testMode: ${{ parameters.testMode }}
      projectSrc: '*.slnx'
      buildParameters: ${{ parameters.buildParameters }}

  - template: ../dotnetcommon/postbuild_common.yml
    parameters:
      postBuildScript: ${{ parameters.postBuildScript }}

  # Install azd
  - ${{ if eq(parameters.installAzd, true) }}:
    - task: Bash@3
      displayName: Install azd
      inputs:
        targetType: 'inline'
        script: |
          curl -fsSL https://aka.ms/install-azd.sh | bash

  # azd delegate auth to az to use service connection with AzureCLI@2
  - pwsh: |
      azd config set auth.useAzCliAuth "true"
    displayName: Configure AZD to Use AZ CLI Authentication.

  - task: AzureCLI@2
    displayName: Package Aspire Project Environment ${{ parameters.name }}
    inputs:
      azureSubscription: ${{ parameters.azureSubscription }}
      scriptType: bash
      scriptLocation: inlineScript
      workingDirectory: ${{ parameters.projectSrc }}
      inlineScript: |
        azd restore --all --no-prompt
    env:
      ${{ if parameters.environment.environmentVariables }}:
        ${{ each envVar in parameters.environment.environmentVariables }}:
          ${{ envVar.key }}: ${{ envVar.value }}

  - ${{ if eq(parameters.whatIfDeploy, true) }}:
    - task: AzureCLI@2
      displayName: WhatIf Deploy ${{ parameters.name }}
      inputs:
        azureSubscription: ${{ parameters.azureSubscription }}
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          azd provision -e ${{ parameters.name }} --preview --no-prompt --debug --no-state
      env:
        ${{ if parameters.environment.environmentVariables }}:
          ${{ each envVar in parameters.environment.environmentVariables }}:
            ${{ envVar.key }}: ${{ envVar.value }}
